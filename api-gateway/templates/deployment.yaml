apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
   app: {{ include "api-gateway.fullname" . }}
   group: api
spec:
  selector:
    matchLabels:
      app: {{ include "api-gateway.fullname" . }}
  replicas: {{ .Values.api_gateway.replicas }}
  template:
    metadata:
      labels:
        app: {{ include "api-gateway.fullname" . }}
        group: api
      name: {{ include "api-gateway.fullname" . }}
      annotations:
       checksum/config: {{ include (print $.Template.BasePath "/config-maps.yaml") . | sha256sum }}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ .Values.api_gateway.nodeAffinityKey }}
                operator: In
                values: [{{ .Values.api_gateway.nodeType | quote }}]
      containers:
      - name: {{ include "api-gateway.fullname" . }}
        image: {{ .Values.image.repository }}/api-gateway:{{ .Values.api_gateway.imageTag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.api_gateway.gateway_port }}
          name: tcp
        livenessProbe:
          httpGet:
            path: "{{ .Values.api_gateway.metrics.basePath }}{{ .Values.api_gateway.metrics.health.path }}/liveness"
            port: {{ .Values.api_gateway.metrics.port }}
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 10
          successThreshold: 1
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: "{{ .Values.api_gateway.metrics.basePath }}{{ .Values.api_gateway.metrics.health.path }}/readiness"
            port: {{ .Values.api_gateway.metrics.port }}
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 10
          successThreshold: 1
          timeoutSeconds: 5
        resources:
{{ toYaml .Values.api_gateway.resources | indent 10 }}
        env:
        - name: app
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['app']
        - name: msCtype
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['group']
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: CATALINA_OPTS
          value : "{{ printf "%s %s" .Values.api_gateway.jvmOpts .Values.api_gateway.javaOpts | trim }}"
        {{- if and (.Values.api_gateway.metrics.enabled) (.Values.api_gateway.metrics.datadog.enabled) }}
        - name: management_datadog_metrics_export_api-key
          valueFrom:
            secretKeyRef:
              name: {{ include "api-gateway.fullname" . }}-datadog-credentials
              key: api-key
        - name: management_datadog_metrics_export_application-key
          valueFrom:
            secretKeyRef:
              name: {{ include "api-gateway.fullname" . }}-datadog-credentials
              key: application-key
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ include "api-gateway.fullname" . }}-config
        volumeMounts:
          - mountPath: /opt/api-gateway/logs
            name: logs
          - mountPath: /opt/api-gateway/pem_files
            name: public-keys
          - mountPath: "{{ .Values.api_gateway.customPlugins.libraryPath }}"
            name: custom-plugins
      serviceAccountName: {{ include "api-gateway.fullname" . }}
      volumes:
        - name: logs
          emptyDir: {}
        - name: config
          emptyDir: {}
        - name: custom-plugins
          emptyDir: {}
        - name: public-keys
          secret:
            optional: true
            secretName: {{ include "api-gateway.fullname" . }}-public-key
{{- if or .Values.api_gateway.apiRegistryEnabled .Values.api_gateway.customPlugins.enabled }}
      initContainers:
      {{- if .Values.api_gateway.apiRegistryEnabled }}
      - name: wait-for-api-registry
        image: curlimages/curl:8.18.0
        command: ["sh", "-c"]
        args: 
        - |-
          echo "[$(date)] Waiting for API Registry to be ready..."
          until curl -sf {{ .Values.api_gateway.registry_service_name }}:{{ .Values.api_registry.metrics.port }}{{ .Values.api_registry.metrics.basePath }}{{ .Values.api_registry.metrics.health.path }}/readiness > /dev/null 2>&1; do
            echo "[$(date)] API Registry is not ready yet. Retrying in 5 seconds..."
            sleep 5
          done
          echo ""
          echo "[$(date)] API Registry is ready. Proceeding with API Gateway startup."
      {{- end }}
      {{- if .Values.api_gateway.customPlugins.enabled }} 
      - name: custom-plugins
        image: curlimages/curl:8.18.0
        command: ["sh", "-c"]
        args: 
        - |-
          {{- $values := .Values }}
          set -e
          echo "[$(date)] Starting plugin download..."
          {{- range $plugin := .Values.api_gateway.customPlugins.plugins }}
          echo "[$(date)] Downloading plugin: {{ $plugin.name }}"
          if curl -sf -X GET "{{- $plugin.url -}}" -u $ARTIFACTORY_USERNAME:$ARTIFACTORY_PASSWORD -o {{ $values.api_gateway3.customPlugins.libraryPath }}/{{- $plugin.name -}}.jar > /tmp/curl_output.log 2>&1; then
            echo "[$(date)] Plugin {{ $plugin.name }} download completed."
          else
            echo "[$(date)] ERROR: Failed to download plugin {{ $plugin.name }}"
            cat /tmp/curl_output.log
            exit 1
          fi
          {{- end }}
          echo ""
          echo "[$(date)] Verifying downloaded plugins:"
          ls -ltr {{ $values.api_gateway3.customPlugins.libraryPath }}
          echo ""
          echo "[$(date)] All plugins downloaded successfully."
        env:
        - name: ARTIFACTORY_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "api-gateway.fullname" . }}-artifactory-credentials
              key: artifactory-username
        - name: ARTIFACTORY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "api-gateway.fullname" . }}-artifactory-credentials
              key: artifactory-password
        volumeMounts:
          - name: custom-plugins
            mountPath: "{{ .Values.api_gateway.customPlugins.libraryPath }}"
{{- end }}
{{- end }}
