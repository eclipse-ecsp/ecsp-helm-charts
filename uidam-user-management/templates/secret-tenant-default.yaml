apiVersion: v1
kind: Secret
metadata:
  name: {{ include "uidam-user-management.fullname" . }}-tenant-default-credentials
  labels: {{- include "uidam-user-management.labels" . | nindent 4 }}
data:
  username: {{ .Values.postgresql.userName | b64enc | quote }}
  password: {{ .Values.postgresql.password | b64enc | quote }}
  revokeTokenClientSecret: {{ .Values.tenantSecrets.default.revokeTokenClientSecret | b64enc | quote }}
  clientsecretkey: {{ .Values.tenantSecrets.default.clientSecretKey | b64enc | quote }}
  clientsecretsalt: {{ .Values.tenantSecrets.default.clientSecretSalt | b64enc | quote }}
  liquibase_clientsecret: {{ .Values.tenantSecrets.default.liquibase_clientsecret | b64enc | quote }}
  liquibase_userpwd: {{ .Values.tenantSecrets.default.liquibase_userpwd | b64enc | quote }}
  liquibase_usersalt: {{ .Values.tenantSecrets.default.liquibase_usersalt | b64enc | quote }}
# Updated to match latest opensource-perf-app structure and logic for tenant default secret, all secrets set to 'ChangeMe'
